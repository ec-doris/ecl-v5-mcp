<!-- Default range with form-group runtime root -->
<div class="ecl-form-group ecl-u-mb-l" data-ecl-auto-init="Range">
  <label class="ecl-form-label" for="range-default" id="range-default-label"
    >Range slider<span class="ecl-form-label__optional">(optional)</span></label
  >
  <div class="ecl-help-block" id="range-default-helper">Optional help text</div>
  <div
    class="ecl-range-container ecl-range-container--m"
    data-ecl-range-container
  >
    <input
      data-ecl-range-input
      type="range"
      class="ecl-range ecl-range--m"
      id="range-default"
      aria-describedby="range-default-helper range-default-value"
      aria-label="Range slider"
      name="range-default"
      max="30"
      value="15"
    />
    <div
      class="ecl-range__bubble ecl-range__bubble--visible"
      data-ecl-range-bubble
    >
      <span class="ecl-range__value-bubble" data-ecl-range-value-current></span>
    </div>
    <div class="ecl-range__value" id="range-default-value">
      Value:
      <span
        class="ecl-range__value-current"
        data-ecl-range-value-current
      ></span>
    </div>
  </div>
</div>

<!-- Numeric options, required state, and described-by extension -->
<div class="ecl-form-group ecl-u-mb-l" data-ecl-auto-init="Range">
  <label class="ecl-form-label" for="range-step" id="range-step-label"
    >Required range<span class="ecl-form-label__required">*</span></label
  >
  <div class="ecl-help-block" id="range-step-helper">Choose a value in steps of five.</div>
  <p class="ecl-u-type-paragraph-s" id="range-step-extra">
    This paragraph is linked with an extra aria-describedby attribute.
  </p>
  <div
    class="ecl-range-container ecl-range-container--m"
    data-ecl-range-container
  >
    <input
      data-ecl-range-input
      type="range"
      class="ecl-range ecl-range--m"
      id="range-step"
      aria-describedby="range-step-extra range-step-value"
      aria-label="Required range"
      name="range-step"
      min="5"
      max="50"
      step="5"
      value="25"
      required
    />
    <div class="ecl-range__bubble" data-ecl-range-bubble>
      <span class="ecl-range__value-bubble" data-ecl-range-value-current></span>
    </div>
    <div class="ecl-range__value" id="range-step-value">
      Selected:
      <span
        class="ecl-range__value-current"
        data-ecl-range-value-current
      ></span>
    </div>
  </div>
</div>
