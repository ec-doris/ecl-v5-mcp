<!-- Default -->
<textarea
  id="example-textarea-id-1"
  class="ecl-text-area ecl-text-area--m"
  rows="4"
  placeholder="Placeholder text"
></textarea>

<!-- Name and pre-filled value -->
<!-- prettier-ignore -->
<textarea id="textarea-comment" class="ecl-text-area ecl-text-area--m" name="comment" rows="6" placeholder="Please enter your comment">Hello world!</textarea>

<!-- Invalid -->
<textarea
  id="textarea-invalid"
  class="ecl-text-area ecl-text-area--invalid ecl-text-area--m"
  rows="4"
  placeholder="Placeholder text"
></textarea>

<!-- Disabled -->
<textarea
  id="textarea-disabled"
  class="ecl-text-area ecl-text-area--m"
  rows="4"
  placeholder="Placeholder text"
  disabled
></textarea>

<!-- Required -->
<textarea
  id="textarea-required"
  class="ecl-text-area ecl-text-area--m"
  rows="4"
  placeholder="Placeholder text"
  required
></textarea>

<!-- Readonly styling hook -->
<!-- prettier-ignore -->
<textarea id="textarea-readonly" class="ecl-text-area ecl-text-area--m ecl-text-area--readonly" rows="4" readonly>Read-only content</textarea>

<!-- Small width -->
<textarea
  id="textarea-small"
  class="ecl-text-area ecl-text-area--s"
  rows="4"
></textarea>

<!-- Large width -->
<textarea
  id="textarea-large"
  class="ecl-text-area ecl-text-area--l"
  rows="4"
></textarea>

<!-- Extra classes and attributes -->
<textarea
  id="textarea-extensions"
  class="ecl-text-area ecl-text-area--m custom-class custom-class--test"
  rows="5"
  data-test="data-test-value"
  data-empty
></textarea>

<!-- Edge: no id, name, placeholder, or value -->
<textarea class="ecl-text-area ecl-text-area--m" rows="4"></textarea>
