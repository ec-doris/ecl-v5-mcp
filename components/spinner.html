<!-- Default story output: primary, medium, centered, visible, with text -->
<div
  class="ecl-spinner ecl-spinner--primary ecl-spinner--m ecl-spinner--centered ecl-spinner--visible"
  role="alert"
>
  <svg class="ecl-spinner__loader" viewBox="25 25 50 50">
    <circle
      class="ecl-spinner__circle"
      cx="50"
      cy="50"
      r="20"
      fill="none"
      stroke-width="4px"
      stroke-miterlimit="10"
      vector-effect="non-scaling-stroke"
    ></circle>
  </svg>
  <div class="ecl-spinner__text">Loading</div>
</div>
