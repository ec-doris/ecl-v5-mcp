<h3 class="ecl-u-type-heading-3">Search Form</h3>
<div class="ecl-u-mb-l">
  <form class="ecl-search-form" role="search">
    <div class="ecl-form-group">
      <label
        class="ecl-form-label ecl-search-form__label"
        for="search-input-id"
        id="search-input-id-label"
      >
        Search
      </label>
      <input
        class="ecl-text-input ecl-text-input--m ecl-search-form__text-input"
        id="search-input-id"
        placeholder="Placeholder text"
        type="search"
      />
    </div>
    <button
      class="ecl-button ecl-button--tertiary ecl-button--neutral ecl-search-form__button ecl-button--icon-only"
      type="submit"
    >
      <span class="ecl-button__container">
        <span
          aria-hidden="true"
          class="wt-icon--search ecl-icon ecl-icon--m ecl-button__icon ecl-icon--search"
          data-ecl-icon
        ></span>
        <span class="ecl-button__label" data-ecl-label="true">Search</span>
      </span>
    </button>
  </form>
</div>
